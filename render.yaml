services:
  - type: web
    name: billclear
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ALLOW_MOCK_ANALYSIS
        value: "false"
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: ""
      - key: JSON_BODY_LIMIT
        value: 18mb
      - key: SCAN_RATE_LIMIT
        value: "30"
