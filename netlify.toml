[build]
base = "server"
command = "npm ci"
publish = "public"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "20"

[functions]
node_bundler = "esbuild"
included_files = ["providers/**", "analyzeBillPrompt.js", "node_modules/pdf-parse/lib/pdf.js/**"]

[[redirects]]
from = "/health"
to = "/.netlify/functions/api/health"
status = 200
force = true

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/api/:splat"
status = 200
force = true
